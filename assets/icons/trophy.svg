<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definitions for glowing filters -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Cup Rim & Bowl -->
  <path d="M 28 20 L 72 20 L 72 23 C 72 38, 28 38, 28 23 Z" fill="none" stroke="#ffd700" stroke-width="3" stroke-linejoin="round" filter="url(#glow)" />
  <path d="M 40 37 C 40 48, 60 48, 60 37" fill="none" stroke="#ffd700" stroke-width="2" filter="url(#glow)" />

  <!-- Handles -->
  <path d="M 28 24 C 18 24, 18 36, 28 36" fill="none" stroke="#ffd700" stroke-width="2" filter="url(#glow)" />
  <path d="M 72 24 C 82 24, 82 36, 72 36" fill="none" stroke="#ffd700" stroke-width="2" filter="url(#glow)" />

  <!-- Stem & Base -->
  <path d="M 50 48 L 50 68" fill="none" stroke="#ffd700" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)" />
  <path d="M 38 68 L 62 68" fill="none" stroke="#ffd700" stroke-width="3" stroke-linecap="round" filter="url(#glow)" />
  <path d="M 30 78 L 70 78" fill="none" stroke="#ffd700" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
  <path d="M 34 68 L 30 78 M 66 78 L 62 68" fill="none" stroke="#ffd700" stroke-width="2" filter="url(#glow)" />

  <!-- Stars spark details -->
  <path d="M 22 14 L 24 10 L 26 14 L 22 14 Z M 78 12 L 80 8 L 82 12 L 78 12 Z" fill="#ffd700" filter="url(#glow)" />
</svg>
