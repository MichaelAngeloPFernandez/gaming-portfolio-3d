<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definitions for glowing filters -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Game Controller Body -->
  <path d="M 22 28 C 38 28, 62 28, 78 28 C 90 28, 95 40, 88 64 C 85 74, 73 82, 65 76 C 58 70, 42 70, 35 76 C 27 82, 15 74, 12 64 C 5 40, 10 28, 22 28 Z" 
        fill="none" stroke="#ff0055" stroke-width="3" stroke-linejoin="round" filter="url(#glow)" />

  <!-- D-Pad (Left side) -->
  <path d="M 30 42 L 30 52 M 25 47 L 35 47" fill="none" stroke="#ff0055" stroke-width="2.5" stroke-linecap="square" filter="url(#glow)" />

  <!-- Action Buttons (Right side) -->
  <circle cx="68" cy="42" r="3.5" fill="none" stroke="#ff0055" stroke-width="2" filter="url(#glow)" />
  <circle cx="76" cy="50" r="3.5" fill="none" stroke="#ff0055" stroke-width="2" filter="url(#glow)" />

  <!-- Select/Start Buttons (Center) -->
  <line x1="43" y1="52" x2="49" y2="46" stroke="#ff0055" stroke-width="2" stroke-linecap="round" filter="url(#glow)" />
  <line x1="51" y1="52" x2="57" y2="46" stroke="#ff0055" stroke-width="2" stroke-linecap="round" filter="url(#glow)" />
</svg>
