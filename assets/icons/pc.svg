<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definitions for glowing filters -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Desktop Monitor Screen -->
  <rect x="15" y="15" width="54" height="36" rx="3" fill="none" stroke="#39ff14" stroke-width="3" filter="url(#glow)" />
  <!-- Monitor Inner Screen Border -->
  <rect x="18" y="18" width="48" height="30" fill="none" stroke="#39ff14" stroke-width="1" opacity="0.5" />
  
  <!-- Monitor Stand -->
  <path d="M 37 51 L 32 65 L 52 65 L 47 51 Z" fill="none" stroke="#39ff14" stroke-width="3" stroke-linejoin="round" filter="url(#glow)" />
  
  <!-- Desktop PC Tower -->
  <rect x="73" y="15" width="14" height="43" rx="2" fill="none" stroke="#39ff14" stroke-width="3" filter="url(#glow)" />
  <!-- Tower details (Power Button & CD drive slots) -->
  <line x1="77" y1="22" x2="83" y2="22" stroke="#39ff14" stroke-width="2" filter="url(#glow)" />
  <circle cx="80" cy="50" r="2.5" fill="none" stroke="#39ff14" stroke-width="1.5" filter="url(#glow)" />

  <!-- Keyboard base -->
  <line x1="12" y1="78" x2="65" y2="78" stroke="#39ff14" stroke-width="3" stroke-linecap="round" filter="url(#glow)" />
  <path d="M 18 78 L 22 72 L 55 72 L 59 78" fill="none" stroke="#39ff14" stroke-width="2" stroke-linejoin="round" opacity="0.8" />

  <!-- Mouse -->
  <rect x="73" y="70" width="10" height="15" rx="5" fill="none" stroke="#39ff14" stroke-width="2" filter="url(#glow)" />
  <line x1="78" y1="70" x2="78" y2="76" stroke="#39ff14" stroke-width="1" />
</svg>
