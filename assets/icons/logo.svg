<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definitions for glowing filters -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagonal frame -->
  <polygon points="50,10 85,30 85,70 50,90 15,70 15,30" fill="none" stroke="#00f0ff" stroke-width="3" filter="url(#glow)" />
  <!-- Inner hexagon -->
  <polygon points="50,16 80,33 80,67 50,84 20,67 20,33" fill="none" stroke="#b44fff" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.8" />

  <!-- Stylized G character -->
  <path d="M 46 36 L 36 36 L 36 64 L 64 64 L 64 50 L 50 50" fill="none" stroke="#00f0ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <!-- Stylized P character overlapping -->
  <path d="M 52 36 L 52 64 M 52 36 L 64 36 L 64 50 L 52 50" fill="none" stroke="#b44fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>
